ona:\",\"choices\":[{\"key\":\"A\",\"text\":\"rýchlosť chemickej rekcie je priamo úmerná súčtu molárnych koncentrácii reaktantov a produktov\"},{\"key\":\"B\",\"text\":\"rýchlosť chemickej reakcie je pri stálej teplote priamo úmerná súčinu koncentrácií dosiaľ nezreagovaných reaktantov\"},{\"key\":\"C\",\"text\":\"sa rýchlosť v priebehu chemickej reakcie nemení, je konštantná\"},{\"key\":\"D\",\"text\":\"rýchlosť pre všeobecnú reakciu vypočítame podľa rovnice v = k . c(A) α . c(B) β\"}],\"correctChoices\":[\"B\",\"D\"]},{\"id\":\"chemistry-219\",\"sourceQuestionNumber\":219,\"subject\":\"chemistry\",\"prompt\":\"Rýchlostná konštanta k:\",\"choices\":[{\"key\":\"A\",\"text\":\"je konštanta pre daný typ chemickej reakcie\"},{\"key\":\"B\",\"text\":\"závisí od teploty\"},{\"key\":\"C\",\"text\":\"závisí od skupenstva reagujúcich látok\"},{\"key\":\"D\",\"text\":\"závisí len od koncentrácie produktov\"}],\"correctChoices\":[\"A\",\"B\"]},{\"id\":\"chemistry-220\",\"sourceQuestionNumber\":220,\"subject\":\"chemistry\",\"prompt\":\"Podľa Arrhenia:\",\"choices\":[{\"key\":\"A\",\"text\":\"rýchlosť chemickej reakcie závisí od teploty\"},{\"key\":\"B\",\"text\":\"ak sa teplota reakčnej sústavy zvýši o 10 o C, rýchlosť každej reakcie sa zvýši štvornásobne\"},{\"key\":\"C\",\"text\":\"ak sa teplota reakcie zvýši o 2-4 o C, rýchlosť chemickej reakcie bude desaťkrát väčšia\"},{\"key\":\"D\",\"text\":\"ak sa teplota reakčnej sústavy zvýši o 10 o C, rýchlosť chemickej reakcie sa zvýši 2-4 krát\"}],\"correctChoices\":[\"A\",\"D\"]},{\"id\":\"chemistry-221\",\"sourceQuestionNumber\":221,\"subject\":\"chemistry\",\"prompt\":\"Rýchlosť chemickej reakcie môže ovplyvniť:\",\"choices\":[{\"key\":\"A\",\"text\":\"len teplota, lebo rýchlostná konštanta závisí len od teploty\"},{\"key\":\"B\",\"text\":\"len koncentrácia reaktantov, ako vyplýva z I. kinetického zákona\"},{\"key\":\"C\",\"text\":\"veľkosť povrchu reagujúcich látok\"},{\"key\":\"D\",\"text\":\"prítomnosť katalyzátora\"}],\"corr
